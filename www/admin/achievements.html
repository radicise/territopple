<!DOCTYPE html>
<html>
    <head>
        <script src="/_icons.js"></script>
        <title>Territopple - Admin Achievements</title>
        <link rel="stylesheet" type="text/css" href="/admin/css/achievements.css" />
    </head>
    <body>
        <meta data-import="/components/admin/disp.html" />
        <a href="/admin">admin home</a><br>
        <div id="main-layout">
            <div id="left-pane">
                <div id="search-cont">
                    <label for="search-kind">Kind: </label>
                    <select id="search-kind">
                        <option value="acts">Actions</option>
                        <option value="achi" selected>Achievements</option>
                    </select><br>
                    <span id="search-holder">
                        <input type="text" id="search-name" placeholder=".*">
                        <input type="button" value="Search" id="search-go">
                    </span><br>
                    <span id="search-create-holder">
                        <label for="search-create-name">Name/Id: </label>
                        <input type="text" id="search-create-name">
                        <select id="search-create-type">
                            <option value="acts" selected>Action</option>
                            <option value="agrp">Action Group</option>
                            <option value="achi">Achievement</option>
                        </select>
                        <input type="button" value="Create" id="search-create" disabled>
                    </span>
                </div>
                <div id="search-results"></div>
                <div id="search-pages">
                    <span>
                        Page <input type="number" value="1" min="1" max="100" id="search-page-in"> of <span id="search-page-count">?</span> <input type="button" value="Go" id="search-page-go">
                    </span>
                </div>
            </div>
            <div id="center-pane">
                <x-polypanel id="item-details">
                    <x-pp-panel shared>
                        <x-pp-shared name="change-actions" definition>
                            <input type="button" value="Edit" id="idca-edit">
                            <input type="button" value="Delete" id="idca-delete">
                            <input type="button" value="Cancel/Unstage" id="idca-cancel">
                            <input type="button" value="Stage" id="idca-stage">
                        </x-pp-shared>
                    </x-pp-panel>
                    <x-pp-panel pid="action">
                        <h2>Action</h2>
                        <label for="det-act-id">Action ID: +</label>
                        <input type="text" id="det-act-id" disabled>
                        <x-pp-shared name="change-actions"></x-pp-shared>
                        <br>
                        <fieldset id="det-act-tperms-set">
                            <legend>Trigger Permissions</legend>
                            <table id="det-act-tperms-outer">
                                <thead>
                                </thead>
                                <tbody id="det-act-tperms"></tbody>
                            </table>
                        </fieldset>
                        <!-- <select id="pp-test-select">
                            <option value="blank">blank</option>
                            <option value="test1">test1</option>
                            <option value="test2">test2</option>
                        </select>
                        <x-polypanel id="pp-test-panel" bound-select="pp-test-select">
                            <x-pp-panel pid="blank" default="1"></x-pp-panel>
                            <x-pp-panel pid="test1">
                                Test1
                            </x-pp-panel>
                            <x-pp-panel pid="test2">
                                Test2 <input type="button" value="goto t1" onclick="document.getElementById('pp-test-panel').switchPanel('test1');">
                            </x-pp-panel>
                        </x-polypanel> -->
                    </x-pp-panel>
                    <x-pp-panel pid="agroup">
                        <h2>Action Group</h2>
                        <label for="det-grp-id">Group ID: -</label>
                        <input type="text" id="det-grp-id" disabled>
                    </x-pp-panel>
                    <x-pp-panel pid="achieve"></x-pp-panel>
                    <x-pp-panel pid="error">
                        <h2>Error: <span id="det-err-type">type unset</span></h2>
                        <p id="det-err-info"></p>
                    </x-pp-panel>
                    <x-pp-panel pid="blank" default></x-pp-panel>
                </x-polypanel>
            </div>
            <div id="right-pane">
                <h3>Staged Changes</h3>
                <span>
                    <input type="button" value="Commit" id="staged-commit">
                    <input type="button" value="Discard" id="staged-discard">
                </span>
                <div id="staged-list"></div>
            </div>
        </div>
        <script src="/components/utils/make.js"></script>
        <script src="/components/utils/variable_display.js"></script>
        <script src="/components/include.js"></script>
        <script src="/admin/js/achievements.js"></script>
    </body>
</html>
