<!DOCTYPE html>
<html>
    <head>
        <script src="/_icons.js"></script>
        <title>Territopple - Admin Priv Group Management</title>
        <link rel="stylesheet" type="text/css" href="/admin/css/priv-groups.css" />
    </head>
    <body>
        <meta data-import="/components/admin/disp.html" />
        <a href="/admin">admin home</a><br>
        <div id="pg-search-cont">
            <label for="pgs-entry">Priv Group Name: </label>
            <input type="text" id="pgs-entry">
            <input type="button" value="Search" id="pgs-button">
        </div>
        <div id="pg-quick-controls">
            <input type="button" value="Create" id="pgqc-create" onclick="document.getElementById('create-form').hidden=false">
        </div>
        <div id="create-form" class="modal" hidden>
            <div>
                <div id="pg-cf-panes">
                    <div>
                        <label for="pg-cf-name">Group Name: </label>
                        <input type="text" id="pg-cf-name"><br>
                        <p id="pg-cf-error" hidden>
                            <span style="color: darkred;">Error: </span>
                            <span></span>
                        </p>
                    </div>
                    <div id="pg-cf-privs"></div>
                </div>
                <input type="button" value="Create Group" id="pg-cf-confirm">
                <input type="button" value="Cancel" id="pg-cf-cancel">
            </div>
        </div>
        <div id="create-result" class="modal" hidden>
            <div>
                <p id="pg-cr-msg"></p>
                <input type="button" value="Okay" onclick="document.getElementById('create-result').hidden=true">
            </div>
        </div>
        <script src="/components/utils/make.js"></script>
        <script src="/components/include.js"></script>
        <script src="/admin/js/priv-groups.js"></script>
    </body>
</html>
